<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Honey sets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#123523"/>
      <stop offset="0.55" stop-color="#0B2A1D"/>
      <stop offset="1" stop-color="#06180F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.6" cy="0.34" r="0.72">
      <stop offset="0" stop-color="#F5C766" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#E0A23E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#E0A23E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#06180F" stop-opacity="0"/>
      <stop offset="1" stop-color="#03130B" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <polygon id="hex" points="80,0 40,69.3 -40,69.3 -80,0 -40,-69.3 40,-69.3"/>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <ellipse cx="580" cy="430" rx="300" ry="240" fill="#F2B24A" opacity="0.10" filter="url(#soft)"/>

  <!-- abstract honeycomb lattice (geometric, no jar) -->
  <g stroke="#E9C268" fill="none" stroke-width="3">
    <use href="#hex" x="440" y="300" opacity="0.22"/>
    <use href="#hex" x="440" y="439" opacity="0.30"/>
    <use href="#hex" x="440" y="577" opacity="0.18"/>
    <use href="#hex" x="560" y="369" opacity="0.34"/>
    <use href="#hex" x="560" y="508" opacity="0.26"/>
    <use href="#hex" x="680" y="300" opacity="0.20"/>
    <use href="#hex" x="680" y="439" opacity="0.30"/>
    <use href="#hex" x="680" y="577" opacity="0.16"/>
    <use href="#hex" x="800" y="369" opacity="0.18"/>
    <use href="#hex" x="800" y="508" opacity="0.14"/>
  </g>
  <!-- a few cells lit with warm honey -->
  <g fill="#F2B24A">
    <use href="#hex" x="560" y="369" opacity="0.16"/>
    <use href="#hex" x="440" y="439" opacity="0.12"/>
    <use href="#hex" x="680" y="439" opacity="0.10"/>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.045"/>
</svg>
