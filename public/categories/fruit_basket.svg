<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fruit baskets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#103A28"/>
      <stop offset="0.55" stop-color="#0A2A1E"/>
      <stop offset="1" stop-color="#05160F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#C8F169" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#5FB98C" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#5FB98C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A7457"/>
      <stop offset="1" stop-color="#0B3122"/>
    </linearGradient>
    <linearGradient id="leafFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54AA81"/>
      <stop offset="1" stop-color="#15543C"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#05160F" stop-opacity="0"/>
      <stop offset="1" stop-color="#03110B" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <g filter="url(#soft)" opacity="0.5">
    <path d="M250 120 C 120 300 160 560 380 720 C 520 520 520 280 250 120 Z" fill="#0B4530"/>
  </g>

  <!-- two crossing abstract leaf blades -->
  <g transform="translate(500 520)">
    <g transform="rotate(-32) scale(1.05)">
      <path d="M0 -380 C 86 -250 92 -100 0 60 C -92 -100 -86 -250 0 -380 Z" fill="url(#leafBack)" opacity="0.9"/>
      <path d="M0 -356 V40" stroke="#C8F169" stroke-width="3" fill="none" opacity="0.18"/>
    </g>
    <g transform="rotate(34) scale(1.12)">
      <path d="M0 -380 C 86 -250 92 -100 0 60 C -92 -100 -86 -250 0 -380 Z" fill="url(#leafFront)"/>
      <path d="M0 -360 V44" stroke="#DBF59A" stroke-width="4" fill="none" opacity="0.26"/>
      <path d="M0 -270 L48 -224 M0 -270 L-48 -224 M0 -160 L42 -120 M0 -160 L-42 -120 M0 -56 L34 -26 M0 -56 L-34 -26" stroke="#DBF59A" stroke-width="2.5" fill="none" opacity="0.15"/>
    </g>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.045"/>
</svg>
