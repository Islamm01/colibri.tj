<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fruit baskets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E3325"/><stop offset="0.55" stop-color="#0A2A1E"/><stop offset="1" stop-color="#061B13"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.33" r="0.6">
      <stop offset="0" stop-color="#FFB45C" stop-opacity="0.26"/><stop offset="0.5" stop-color="#C8F169" stop-opacity="0.09"/><stop offset="1" stop-color="#C8F169" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8A45E"/><stop offset="1" stop-color="#9C6B30"/>
    </linearGradient>
    <radialGradient id="o1" cx="0.4" cy="0.36" r="0.7"><stop offset="0" stop-color="#FFD08A"/><stop offset="1" stop-color="#E97C2A"/></radialGradient>
    <radialGradient id="o2" cx="0.4" cy="0.36" r="0.7"><stop offset="0" stop-color="#FF8A93"/><stop offset="1" stop-color="#E63B49"/></radialGradient>
    <radialGradient id="o3" cx="0.4" cy="0.36" r="0.7"><stop offset="0" stop-color="#DAF59E"/><stop offset="1" stop-color="#97C42F"/></radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1"><stop offset="0.45" stop-color="#061B13" stop-opacity="0"/><stop offset="1" stop-color="#04140E" stop-opacity="0.66"/></linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <g transform="translate(500 470)">
    <ellipse cx="0" cy="250" rx="230" ry="42" fill="#000" opacity="0.22" filter="url(#soft)"/>
    <!-- fruit pile -->
    <path d="M-150 -150 C -70 -210 30 -210 90 -160" stroke="#C8F169" stroke-width="10" fill="none" opacity="0.7" stroke-linecap="round"/>
    <circle cx="-110" cy="-70" r="92" fill="url(#o1)"/>
    <circle cx="80" cy="-90" r="78" fill="url(#o2)"/>
    <circle cx="-10" cy="-130" r="70" fill="url(#o3)"/>
    <circle cx="150" cy="-30" r="58" fill="url(#o1)"/>
    <ellipse cx="-130" cy="-100" rx="26" ry="16" fill="#fff" opacity="0.25"/>
    <!-- basket -->
    <path d="M-210 -20 H210 L170 210 C 168 230 150 244 130 244 H-130 C -150 244 -168 230 -170 210 Z" fill="url(#basket)"/>
    <g stroke="#7A5226" stroke-width="6" opacity="0.55">
      <path d="M-200 40 H200 M-188 110 H188 M-176 180 H176"/>
      <path d="M-120 -10 V240 M0 -10 V244 M120 -10 V240"/>
    </g>
    <rect x="-220" y="-40" width="440" height="34" rx="17" fill="#B98847"/>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.05"/>
</svg>
