<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fresh and dried fruits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E3325"/>
      <stop offset="0.55" stop-color="#0A2A1E"/>
      <stop offset="1" stop-color="#061B13"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.6">
      <stop offset="0" stop-color="#FFB45C" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#C8F169" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#C8F169" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peach" cx="0.4" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#FFD08A"/>
      <stop offset="0.55" stop-color="#FFA43A"/>
      <stop offset="1" stop-color="#E97C2A"/>
    </radialGradient>
    <radialGradient id="berry" cx="0.4" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#FF8A93"/>
      <stop offset="1" stop-color="#E63B49"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#061B13" stop-opacity="0"/>
      <stop offset="1" stop-color="#04140E" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <!-- soft depth bokeh -->
  <circle cx="180" cy="250" r="120" fill="#C8F169" opacity="0.05" filter="url(#soft)"/>
  <circle cx="850" cy="700" r="160" fill="#0A5C46" opacity="0.35" filter="url(#soft)"/>

  <!-- fruit composition -->
  <g transform="translate(500 430)">
    <!-- leaf -->
    <path d="M-30 -190 C 70 -250 150 -210 150 -210 C 150 -210 120 -120 30 -96 C -40 -78 -60 -150 -30 -190 Z" fill="#C8F169" opacity="0.85"/>
    <path d="M-22 -184 C 40 -200 120 -200 120 -200" stroke="#0A2A1E" stroke-width="4" fill="none" opacity="0.35"/>
    <!-- peach -->
    <circle cx="0" cy="0" r="150" fill="url(#peach)"/>
    <ellipse cx="-50" cy="-55" rx="46" ry="30" fill="#FFFFFF" opacity="0.28"/>
    <!-- berry -->
    <circle cx="160" cy="120" r="88" fill="url(#berry)"/>
    <ellipse cx="135" cy="95" rx="26" ry="16" fill="#FFFFFF" opacity="0.25"/>
    <!-- citrus slice (line) -->
    <g transform="translate(-185 110)" stroke="#C8F169" stroke-width="5" fill="none" opacity="0.8">
      <circle r="74"/>
      <circle r="56"/>
      <path d="M0 -56 V56 M-56 0 H56 M-40 -40 L40 40 M40 -40 L-40 40"/>
    </g>
  </g>

  <!-- dried-fruit / nut accents -->
  <g opacity="0.9">
    <ellipse cx="330" cy="690" rx="34" ry="24" fill="#C77B3A" transform="rotate(-18 330 690)"/>
    <ellipse cx="420" cy="730" rx="30" ry="21" fill="#A85E2C" transform="rotate(12 420 730)"/>
    <ellipse cx="600" cy="700" rx="32" ry="22" fill="#D08B45" transform="rotate(-8 600 700)"/>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.05"/>
</svg>
