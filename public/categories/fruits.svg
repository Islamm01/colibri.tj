<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fresh and dried fruits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0F3A28"/>
      <stop offset="0.55" stop-color="#0A2A1E"/>
      <stop offset="1" stop-color="#05160F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.24" r="0.78">
      <stop offset="0" stop-color="#C8F169" stop-opacity="0.18"/>
      <stop offset="0.42" stop-color="#5FB98C" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#5FB98C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafBack" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1E6044"/>
      <stop offset="1" stop-color="#0A2D1F"/>
    </linearGradient>
    <linearGradient id="leafFront" x1="0.2" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#3E9670"/>
      <stop offset="1" stop-color="#11442F"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8F169" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#C8F169" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#05160F" stop-opacity="0"/>
      <stop offset="1" stop-color="#03110B" stop-opacity="0.74"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <!-- out-of-focus foliage masses (asymmetric depth) -->
  <g opacity="0.7">
    <g transform="translate(300 360) rotate(-34) scale(1.5)" filter="url(#soft)">
      <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="#0C3A28"/>
    </g>
    <g transform="translate(720 700) rotate(26) scale(1.35)" filter="url(#soft)">
      <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="#0B3322"/>
    </g>
  </g>

  <!-- layered foreground leaf blades (abstract, asymmetric, no fruit) -->
  <g filter="url(#soft2)" opacity="0.85">
    <g transform="translate(560 300) rotate(22) scale(0.92)">
      <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="url(#leafBack)"/>
    </g>
  </g>

  <g transform="translate(430 540) rotate(-14) scale(1.12)">
    <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="url(#leafFront)"/>
    <path d="M0 -312 V32" stroke="#C8F169" stroke-width="3.5" fill="none" opacity="0.20"/>
    <path d="M0 -230 L40 -190 M0 -230 L-40 -190 M0 -140 L34 -106 M0 -140 L-34 -106" stroke="#C8F169" stroke-width="2.5" fill="none" opacity="0.12"/>
  </g>

  <g transform="translate(300 600) rotate(-44) scale(0.9)">
    <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="url(#leafFront)"/>
    <path d="M0 -314 V30" stroke="#DBF59A" stroke-width="4" fill="none" opacity="0.26"/>
    <!-- rim light on one edge -->
    <path d="M0 -330 C 66 -228 72 -104 0 48" stroke="#DBF59A" stroke-width="2.5" fill="none" opacity="0.22"/>
  </g>

  <g transform="translate(640 560) rotate(40) scale(0.66)">
    <path d="M0 -330 C 66 -228 72 -104 0 48 C -72 -104 -66 -228 0 -330 Z" fill="url(#leafFront)" opacity="0.9"/>
    <path d="M0 -312 V30" stroke="#C8F169" stroke-width="4" fill="none" opacity="0.18"/>
  </g>

  <rect width="1000" height="1000" fill="url(#sheen)"/>
  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.045"/>
</svg>
