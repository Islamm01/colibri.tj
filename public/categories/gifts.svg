<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gifts by Colibri">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0E3326"/>
      <stop offset="0.5" stop-color="#0A2A1E"/>
      <stop offset="1" stop-color="#050F0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.66" cy="0.34" r="0.7">
      <stop offset="0" stop-color="#F1D885" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#D8B85A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D8B85A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribA" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#B98F3C" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#E7C879"/>
      <stop offset="0.7" stop-color="#F6EBC0"/>
      <stop offset="1" stop-color="#C99B3F" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="ribB" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#8C6A2A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D4AE57"/>
      <stop offset="1" stop-color="#9A7430" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#050F0A" stop-opacity="0"/>
      <stop offset="1" stop-color="#03100A" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <!-- warm depth bloom -->
  <ellipse cx="640" cy="380" rx="320" ry="240" fill="#D8B85A" opacity="0.10" filter="url(#soft)"/>

  <!-- soft blurred ribbon behind (depth) -->
  <path d="M-60 640 C 220 500 420 720 1060 420 L1060 560 C 420 840 220 640 -60 760 Z" fill="url(#ribB)" opacity="0.35" filter="url(#soft)"/>

  <!-- elegant gold silk ribbons (abstract, no box) -->
  <path d="M-60 520 C 240 360 440 560 1060 300 L1060 392 C 440 640 240 460 -60 612 Z" fill="url(#ribA)" opacity="0.85"/>
  <path d="M-60 470 C 240 320 440 510 1060 252 L1060 300 C 440 540 240 380 -60 540 Z" fill="url(#ribB)" opacity="0.6"/>
  <path d="M-60 610 C 260 470 460 660 1060 410 L1060 470 C 460 700 260 540 -60 668 Z" fill="url(#ribA)" opacity="0.45"/>

  <!-- ribbon highlight edge -->
  <path d="M-60 520 C 240 360 440 560 1060 300" fill="none" stroke="#FBF1D2" stroke-width="2.5" opacity="0.35"/>

  <!-- faint gold light specks -->
  <g fill="#F6EBC0">
    <circle cx="300" cy="300" r="3.5" opacity="0.7"/>
    <circle cx="760" cy="250" r="2.5" opacity="0.55"/>
    <circle cx="540" cy="220" r="2" opacity="0.45"/>
    <circle cx="700" cy="560" r="2.5" opacity="0.4"/>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.045"/>
</svg>
