<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gifts by Colibri">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103A2B"/>
      <stop offset="0.55" stop-color="#0A2A20"/>
      <stop offset="1" stop-color="#06190F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.65">
      <stop offset="0" stop-color="#F0E0A0" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#C8F169" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C8F169" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F6C9"/><stop offset="1" stop-color="#C8F169"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B2E04A"/><stop offset="1" stop-color="#86B82E"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E9B8"/><stop offset="1" stop-color="#D8B85A"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#06190F" stop-opacity="0"/>
      <stop offset="1" stop-color="#03110A" stop-opacity="0.68"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <circle cx="500" cy="380" r="230" fill="#D8B85A" opacity="0.10" filter="url(#soft)"/>

  <!-- sparkles -->
  <g fill="#F4E9B8" opacity="0.9">
    <path d="M250 250 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10 z"/>
    <path d="M760 300 l8 20 20 8 -20 8 -8 20 -8 -20 -20 -8 20 -8 z" opacity="0.8"/>
    <path d="M720 560 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.65"/>
  </g>

  <!-- premium gift box -->
  <g transform="translate(500 540)">
    <ellipse cx="0" cy="210" rx="220" ry="40" fill="#000" opacity="0.25" filter="url(#soft)"/>
    <!-- body -->
    <rect x="-180" y="-40" width="360" height="240" rx="14" fill="url(#box)"/>
    <!-- lid -->
    <rect x="-208" y="-92" width="416" height="80" rx="14" fill="url(#lid)"/>
    <!-- vertical ribbon -->
    <rect x="-34" y="-92" width="68" height="292" fill="url(#ribbon)" opacity="0.95"/>
    <!-- bow -->
    <g transform="translate(0 -96)">
      <path d="M0 0 C -70 -64 -150 -52 -150 -10 C -150 26 -78 30 0 4 Z" fill="url(#ribbon)"/>
      <path d="M0 0 C 70 -64 150 -52 150 -10 C 150 26 78 30 0 4 Z" fill="url(#ribbon)"/>
      <ellipse cx="0" cy="2" rx="26" ry="22" fill="#E9D38A"/>
    </g>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.05"/>
</svg>
