<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gift boxes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0E3326"/>
      <stop offset="0.5" stop-color="#0A2A1E"/>
      <stop offset="1" stop-color="#050F0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.72">
      <stop offset="0" stop-color="#F1D885" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#D8B85A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D8B85A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribV" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#C99B3F" stop-opacity="0.15"/>
      <stop offset="0.45" stop-color="#EBD08C"/>
      <stop offset="0.7" stop-color="#F8EEC8"/>
      <stop offset="1" stop-color="#B98F3C" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ribV2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#9A7430" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#D4AE57"/>
      <stop offset="1" stop-color="#8C6A2A" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#050F0A" stop-opacity="0"/>
      <stop offset="1" stop-color="#03100A" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <ellipse cx="500" cy="400" rx="280" ry="260" fill="#D8B85A" opacity="0.10" filter="url(#soft)"/>

  <!-- blurred ribbon behind -->
  <path d="M360 -60 C 480 280 320 540 520 1060 L640 1060 C 460 540 620 300 500 -60 Z" fill="url(#ribV2)" opacity="0.3" filter="url(#soft)"/>

  <!-- crossing gold ribbons (abstract, no box) -->
  <path d="M420 -60 C 540 300 360 560 560 1060 L470 1060 C 300 560 470 300 340 -60 Z" fill="url(#ribV)" opacity="0.85"/>
  <path d="M640 -60 C 560 320 740 540 600 1060 L690 1060 C 820 540 660 320 730 -60 Z" fill="url(#ribV2)" opacity="0.6"/>

  <!-- highlight edges -->
  <path d="M420 -60 C 540 300 360 560 560 1060" fill="none" stroke="#FBF1D2" stroke-width="2.5" opacity="0.32"/>

  <g fill="#F8EEC8">
    <circle cx="320" cy="280" r="3" opacity="0.6"/>
    <circle cx="720" cy="320" r="2.5" opacity="0.5"/>
    <circle cx="540" cy="220" r="2" opacity="0.45"/>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.045"/>
</svg>
