<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gift boxes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103A2B"/><stop offset="0.55" stop-color="#0A2A20"/><stop offset="1" stop-color="#06190F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.64">
      <stop offset="0" stop-color="#F0E0A0" stop-opacity="0.26"/><stop offset="0.5" stop-color="#C8F169" stop-opacity="0.10"/><stop offset="1" stop-color="#C8F169" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#B2E04A"/><stop offset="1" stop-color="#86B82E"/></linearGradient>
    <linearGradient id="b1l" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6C9"/><stop offset="1" stop-color="#C8F169"/></linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EAF3EF"/><stop offset="1" stop-color="#C7D8CF"/></linearGradient>
    <linearGradient id="rib" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4E9B8"/><stop offset="1" stop-color="#D8B85A"/></linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1"><stop offset="0.45" stop-color="#06190F" stop-opacity="0"/><stop offset="1" stop-color="#03110A" stop-opacity="0.68"/></linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <g fill="#F4E9B8" opacity="0.85">
    <path d="M300 230 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z"/>
    <path d="M730 280 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.75"/>
  </g>

  <!-- small back box -->
  <g transform="translate(680 600)">
    <ellipse cx="0" cy="150" rx="150" ry="30" fill="#000" opacity="0.2" filter="url(#soft)"/>
    <rect x="-120" y="-30" width="240" height="170" rx="12" fill="url(#b2)"/>
    <rect x="-134" y="-66" width="268" height="56" rx="12" fill="#DCE7E1"/>
    <rect x="-22" y="-66" width="44" height="206" fill="url(#rib)" opacity="0.9"/>
  </g>

  <!-- main front box -->
  <g transform="translate(420 560)">
    <ellipse cx="0" cy="210" rx="210" ry="38" fill="#000" opacity="0.25" filter="url(#soft)"/>
    <rect x="-170" y="-30" width="340" height="230" rx="14" fill="url(#b1)"/>
    <rect x="-196" y="-84" width="392" height="76" rx="14" fill="url(#b1l)"/>
    <rect x="-32" y="-84" width="64" height="284" fill="url(#rib)" opacity="0.95"/>
    <g transform="translate(0 -88)">
      <path d="M0 0 C -66 -60 -142 -48 -142 -8 C -142 26 -74 30 0 4 Z" fill="url(#rib)"/>
      <path d="M0 0 C 66 -60 142 -48 142 -8 C 142 26 74 30 0 4 Z" fill="url(#rib)"/>
      <ellipse cx="0" cy="2" rx="24" ry="20" fill="#E9D38A"/>
    </g>
  </g>

  <rect width="1000" height="1000" fill="url(#fade)"/>
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.05"/>
</svg>
